name: Build Userscript

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-userscript:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build userscript
        env:
          TAMPERMONKEY_HOMEPAGE_URL: https://github.com/${{ github.repository }}
          TAMPERMONKEY_SUPPORT_URL: https://github.com/${{ github.repository }}/issues
          TAMPERMONKEY_UPDATE_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/release/10comic.user.js
          TAMPERMONKEY_DOWNLOAD_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/release/10comic.user.js
        run: npm run build

      - name: Update README links
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: node scripts/publish-github.js

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 10comic-userscript
          path: release/10comic.user.js

      - name: Commit published userscript
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md release/10comic.user.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: publish userscript [skip ci]"
          git push
